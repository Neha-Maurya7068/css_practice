<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <style>
         body{
            background-color: beige;
            text-align: center;
            justify-content: center;
            margin: 100px;
        } 

        .box{
            height: 250px;
            width: 250px;
            border: 2px solid rgb(163 , 157, 157);
            /* border-top: 10px solid rgba(163, 157, 157, 0.253); */
            background-image: url(./image.png);
            background-repeat: no-repeat;
            
            border-radius: 50%;
            animation: spin 1s ease-out 1;
            animation-delay: 3s;
        }

        @keyframes spin {
            0%{
            transform: rotate(0deg);
            }
            100%{
                transform: rotate(360deg);
            }
            50%{
                transform : rotate(360deg);
            }
            
        } 

    



        
    </style>
</head>
<body>
    <div class="box"></div>
</body>
</html>
