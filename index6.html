<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webpage2</title>
</head>
<style>
   #myDiv{
    height:100px;
    width:100px;
    border:1px solid black;
    background-color: azure;
    transition-duration: 1000ms;
   }
   #myDiv:hover{
    height:250px;
    width:250px;
    border:5px solid lightgreen;
    background-color: antiquewhite;
    transform: rotate(1000deg);
    transition-duration: 8000ms;
    border-radius: 50%;
    margin-top:500px;
    margin-left: 1000px;

   }
   #myDiv1{
    height:100px;
    width:100px;
    border:1px solid black;
    background-color: antiquewhite;
    transition-duration: 1000ms;
    position:relative;
    animation:test1 10s;
   }
   @keyframes test1{
    0%{left:0; top:0;}
    25%{left:550px; top:550px; background-color:blue;}
    50%{left:200px; top:350px; background-color: chartreuse;}
    75%{left:550px; top:450px; transform: rotate(150deg);}
    100%{left:1000px; top:150px; background-color:yellow; transform: rotate(-350deg);}
   }
</style>
</head>
<body>
    <div id="myDiv"></div>
    <div id="myDiv1"></div>
</body>
</html>
