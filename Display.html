<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display</title>
    <style>
        .box{
            /* width: 200px; */
            height: 100px;
            margin: 10px;
            /* display: block; */
            display: inline;
           
        }
        .element-1{
            background-color: yellow;
            display: block;
        }

        .element-2{
            width: 300px;
            height: 100px;
            background-color: red;
            display: inline-block;


        }

        .element-3{
            background-color: blue;
        }

        .span{
            /* width: 300px;
            height: 300px; */
            background-color: blueviolet;
            margin: 10px;
            display: block;
        }
        .element-4{
            background-color: yellow;
        }

        .element-5{
            width: 200px;
            height: 100px;
            background-color: red;
            /* display: none; */
            /* visibility: hidden; */

        }

        .element-6{
            background-color: blue;
            display: inline;
        }


    </style>
</head>
<body>
    

    <div class="box element-1">Div-1</div>
    <div class="box element-2">Div-2</div>
    <div class="box element-3">Div-3</div>

    <span class="span element-4">Span-4</span>
    <span class="span element-5">Span-5</span>
    <span class="span element-6">Span-6</span>

</body>
</html>
