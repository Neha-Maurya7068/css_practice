<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
</head>
<style>
    body{
        background-image: url(taj.jpg);
        background-size: cover;
        background-repeat: no-repeat;
        font-family:'Courier New', Courier, monospace ;
    }
    #box{
        height:300px;
        width:600px;
        border: 3px solid green;
        margin:0px auto;
        margin-top: 180px;
        background-color:black;
        color:white;
        padding: 16px;
        font-weight: bold;
        border-radius: 10px;
        opacity: 0.9;
        box-shadow: 0px 0px 20px 20px black;

    }
</style>
<body>
    <div id="box">
 <center><span style="font-size: 30px; color: white; font-weight:bold;">Login Here</span></center><br/><br/>
 <span style="font-size: 25px;">Email</span> <input type="email" style="height:30px; width:150px; font-weight: bold;" placeholder="Enter your email id..."/><br/><br/>
 <span style="font-size: 25px;">Password</span> <input type="password" style="height:27px; width:375px; font-size: bold;" placeholder="Enter your password..."/><br/><br/>
 <a style="font-size: 18px; text-decoration: none;" href="#">Forget Password...?</a><br/><br/>
 <center> <input type="Submit" value="Login" style="height:38px; width:110px; font-weight: bold; border-radius: 4px; font-weight: bold;;" </center>
    </div>
</body>
</html>
