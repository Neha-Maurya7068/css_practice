<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <style>
        body{
          display : flex;
          text-align: center;
          justify-content: center;
          background-color:beige;
          margin :100px;

        }


        .box{
          /* margin:30px; */
          height:50px;
          width:50px;
          border: 10px solid rgb(163 , 157 , 157);
          border-top : 10px solid rgba(170, 160, 160, 0.205);
          border-radius: 50%;

           animation: spin 1s  infinite; 

          /* text-align: center; */
        }

        @keyframes spin{
           0%{
            transform: rotate(0deg);
           }
           100%{
            transform: rotate(360deg);
           }
        }

        /* .box:hover{
        transform: rotate(360deg);
        transition: 1s;

        } */
    </style>
</head>
<body>
<div class="box"></div>
</body>
</html>
