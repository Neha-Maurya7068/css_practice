<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
</head>
<style>
    #outer{
        height:600px;
        width:1500px;
        background-color: dimgray;
        border:1px solid black;
    }
    #main{
        height:550px;
        width:450px;
        background-color: white;
    }
    #mainLeft{
        height:50px;
        width:200px;
    }
</style>
<body>
    <div id="outer">
        <center><div id="main">
           <form action="#">
           <h1>Login Form</h1></form>
           <div><input type="Email or Username" style="height:40px; width:350px" placeholder="Email or Username"></div><br/>
           <div><input type="password" style="height:40px; width:250px;" placeholder="Password"></div><br/><br/>
           <div><center><input type="Submit" value="Login" style="height:40px; width:400px; font-weight: bold; border-radius: 4px; font-weight: bold; background-color: black; color:white;" ></center></div> 
           <hr style="height: 1px; width:400px;">
           <p style="text-align: center;">Or login with</p>
           <div id="mainLeft"><img src="facebook.png" style="height:20px; width:20px;"</div>
           <div id="mainRight"></div>
            </form>
        </div></center>

    </div>
</body>
</html>
